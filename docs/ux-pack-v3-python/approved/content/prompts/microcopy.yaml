version: 1
prompt_pack: microcopy

openers:
  - "Сделаем короткую паузу и посмотрим на образ вместе."
  - "Можно без спешки: просто отметь первую реакцию."
  - "Здесь нет правильного ответа — только твой смысл."

fallbacks:
  silence:
    - "Если хочешь, можем продолжить позже."
    - "Можно взять паузу. Я рядом, когда будешь готов(а)."
  overload:
    - "Похоже, сейчас многовато. Давай упростим до одного шага."
    - "Не обязательно углубляться: что поможет тебе прямо сейчас?"

closers:
  - "Спасибо за честность. Это важная работа с собой."
  - "Ты хорошо справился(ась) с этим шагом саморефлексии."
